# https://developers.home-assistant.io/docs/dev_101_services/
# https://www.home-assistant.io/docs/blueprint/selectors/

run:
  name: Run
  description: Run Visual Stream Assist pipeline

  fields:
    stream_source:
      name: Stream URL
      description: Link to stream (any type supported by FFmpeg)
      example: rtsp://user:pass@192.168.1.123:554/av_stream/ch0
      selector:
        text:

    camera_entity_id:
      name: Camera Entity
      description: Camera entity to use as audio (STT) source
      selector:
        entity:
          domain: camera
          supported_features:
            - camera.CameraEntityFeature.STREAM

    player_entity_id:
      name: Player Entity
      description: Media player entity for playing TTS and showing popups
      selector:
        entity:
          domain: media_player
          supported_features:
            - media_player.MediaPlayerEntityFeature.PLAY_MEDIA

    browser_id:
      name: Browser ID
      description: Browser Mod browser_id for showing GIF popup
      selector:
        text:

    tts_service:
      name: TTS service
      description: TTS provider name (e.g., edge_tts) used for wake-word responses
      selector:
        text:

    tts_language:
      name: TTS language
      description: TTS voice/language used for wake-word responses (must match pipeline)
      selector:
        text:

    stt_start_media:
      name: Wake word detect media
      description: Comma-separated wake word responses (used to build a media-source TTS URL)
      example: "how can I help you, yes, I'm listening"
      selector:
        text:

    speech_gif:
      name: GIF for speak
      description: Link/path to GIF to display while speaking (e.g. /local/gifs/jarvis_speech.gif)
      selector:
        text:

    listen_gif:
      name: GIF for listen
      description: Link/path to GIF to display while listening (e.g. /local/gifs/jarvis_listen.gif)
      selector:
        text:

    pipeline_id:
      name: Pipeline
      description: Settings > Voice assistants > Pipelines
      selector:
        assist_pipeline:

    assist:
      name: Assist
      description: Advanced pipeline parameters (optional)
      selector:
        object:

    stream:
      name: Stream
      description: Advanced stream parameters (optional)
      selector:
        object:
